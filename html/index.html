<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Keyfob</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="keyfob-container" class="keyfob-container">
        <div class="keyfob-device">
            <!-- Header with vehicle info -->
            <div class="keyfob-header">
                <div class="vehicle-info">
                    <div class="plate-number" id="plate-number">ABC 123</div>
                    <div class="vehicle-status">
                        <span class="status-indicator engine-status" id="engine-status">
                            <i class="fas fa-engine"></i>
                        </span>
                        <span class="status-indicator lock-status" id="lock-status">
                            <i class="fas fa-lock"></i>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Main screen -->
            <div class="keyfob-screen">
                <!-- Vehicle stats -->
                <div class="vehicle-stats">
                    <div class="stat-item" id="fuel-stat">
                        <i class="fas fa-gas-pump"></i>
                        <span class="stat-value" id="fuel-value">85%</span>
                    </div>
                    <div class="stat-item" id="speed-stat">
                        <i class="fas fa-tachometer-alt"></i>
                        <span class="stat-value" id="speed-value">0 km/h</span>
                    </div>
                </div>

                <!-- Control buttons -->
                <div class="control-buttons">
                    <!-- Lock/Unlock -->
                    <div class="control-row">
                        <button class="control-btn lock-btn" id="lock-btn" onclick="toggleLock()">
                            <i class="fas fa-lock"></i>
                            <span class="btn-label">Lock</span>
                        </button>
                        <button class="control-btn unlock-btn" id="unlock-btn" onclick="toggleUnlock()">
                            <i class="fas fa-unlock"></i>
                            <span class="btn-label">Unlock</span>
                        </button>
                    </div>

                    <!-- Engine and Alarm -->
                    <div class="control-row">
                        <button class="control-btn engine-btn" id="engine-btn" onclick="toggleEngine()">
                            <i class="fas fa-power-off"></i>
                            <span class="btn-label">Engine</span>
                        </button>
                        <button class="control-btn alarm-btn" id="alarm-btn" onclick="triggerAlarm()">
                            <i class="fas fa-bell"></i>
                            <span class="btn-label">Alarm</span>
                        </button>
                    </div>

                    <!-- Trunk and Hood -->
                    <div class="control-row">
                        <button class="control-btn trunk-btn" id="trunk-btn" onclick="toggleTrunk()">
                            <i class="fas fa-box"></i>
                            <span class="btn-label">Trunk</span>
                        </button>
                        <button class="control-btn hood-btn" id="hood-btn" onclick="toggleHood()">
                            <i class="fas fa-car"></i>
                            <span class="btn-label">Hood</span>
                        </button>
                    </div>
                </div>

                <!-- Door controls -->
                <div class="door-controls">
                    <h4>Doors</h4>
                    <div class="door-grid">
                        <button class="door-btn" id="door-0" onclick="toggleDoor(0)">
                            <i class="fas fa-door-open"></i>
                            <span>Driver</span>
                        </button>
                        <button class="door-btn" id="door-1" onclick="toggleDoor(1)">
                            <i class="fas fa-door-open"></i>
                            <span>Passenger</span>
                        </button>
                        <button class="door-btn" id="door-2" onclick="toggleDoor(2)">
                            <i class="fas fa-door-open"></i>
                            <span>Rear Left</span>
                        </button>
                        <button class="door-btn" id="door-3" onclick="toggleDoor(3)">
                            <i class="fas fa-door-open"></i>
                            <span>Rear Right</span>
                        </button>
                    </div>
                </div>

                <!-- Window controls -->
                <div class="window-controls">
                    <h4>Windows</h4>
                    <div class="window-grid">
                        <button class="window-btn" id="window-0" onclick="toggleWindow(0)">
                            <i class="fas fa-window-maximize"></i>
                            <span>Driver</span>
                        </button>
                        <button class="window-btn" id="window-1" onclick="toggleWindow(1)">
                            <i class="fas fa-window-maximize"></i>
                            <span>Passenger</span>
                        </button>
                        <button class="window-btn" id="window-2" onclick="toggleWindow(2)">
                            <i class="fas fa-window-maximize"></i>
                            <span>Rear Left</span>
                        </button>
                        <button class="window-btn" id="window-3" onclick="toggleWindow(3)">
                            <i class="fas fa-window-maximize"></i>
                            <span>Rear Right</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="keyfob-footer">
                <button class="close-btn" onclick="closeKeyfob()">
                    <i class="fas fa-times"></i>
                    Close
                </button>
            </div>
        </div>
    </div>

    <!-- Audio elements for sounds -->
    <audio id="lock-sound" src="sounds/lock.ogg" preload="auto"></audio>
    <audio id="unlock-sound" src="sounds/unlock.ogg" preload="auto"></audio>
    <audio id="start-sound" src="sounds/start.ogg" preload="auto"></audio>
    <audio id="stop-sound" src="sounds/stop.ogg" preload="auto"></audio>
    <audio id="trunk-sound" src="sounds/trunk.ogg" preload="auto"></audio>
    <audio id="window-sound" src="sounds/window.ogg" preload="auto"></audio>
    <audio id="alarm-sound" src="sounds/alarm.ogg" preload="auto"></audio>

    <script src="index.js"></script>
</body>
</html>
